<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#ffffff" />
    <title>腿替 - 专业跑腿服务平台</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .container {
        text-align: center;
        color: white;
        padding: 20px;
      }
      .logo {
        font-size: 120px;
        margin-bottom: 20px;
      }
      .title {
        font-size: 48px;
        font-weight: bold;
        margin-bottom: 10px;
      }
      .subtitle {
        font-size: 24px;
        opacity: 0.9;
        margin-bottom: 30px;
      }
      .services {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
        max-width: 600px;
        margin: 0 auto;
      }
      .service-card {
        background: rgba(255, 255, 255, 0.15);
        border-radius: 20px;
        padding: 20px;
        backdrop-filter: blur(10px);
        cursor: pointer;
        transition: transform 0.3s ease;
      }
      .service-card:hover {
        transform: scale(1.05);
      }
      .service-icon {
        font-size: 48px;
        margin-bottom: 10px;
      }
      .service-name {
        font-size: 18px;
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">🦵</div>
      <div class="title">腿替</div>
      <div class="subtitle">您的专属跑腿服务</div>
      <div class="services">
        <div class="service-card" onclick="showService('打印材料')">
          <div class="service-icon">🖨️</div>
          <div class="service-name">打印材料</div>
        </div>
        <div class="service-card" onclick="showService('取外卖')">
          <div class="service-icon">🍔</div>
          <div class="service-name">取外卖</div>
        </div>
        <div class="service-card" onclick="showService('搬东西')">
          <div class="service-icon">📦</div>
          <div class="service-name">搬东西</div>
        </div>
        <div class="service-card" onclick="showService('代购物')">
          <div class="service-icon">🛒</div>
          <div class="service-name">代购物</div>
        </div>
        <div class="service-card" onclick="showService('送文件')">
          <div class="service-icon">📄</div>
          <div class="service-name">送文件</div>
        </div>
        <div class="service-card" onclick="showService('其他')">
          <div class="service-icon">✨</div>
          <div class="service-name">其他</div>
        </div>
      </div>
    </div>
    <script>
      function showService(name) {
        alert('选择服务: ' + name + '\n\n即将跳转到发布页面...');
      }
    </script>
  </body>
</html>
